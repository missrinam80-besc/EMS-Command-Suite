name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Runtime regression tests
        run: npm run test:runtime

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

  e2e-cross-tenant-isolation:
    if: github.ref == 'refs/heads/main' && secrets.E2E_TENANT_BASE_URL != '' && secrets.E2E_TENANT_A_EMAIL != '' && secrets.E2E_TENANT_A_PASSWORD != '' && secrets.E2E_TENANT_A_PATIENT_ID != '' && secrets.E2E_TENANT_B_EMAIL != '' && secrets.E2E_TENANT_B_PASSWORD != '' && secrets.E2E_TENANT_B_PATIENT_ID != ''
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run cross-tenant isolation tests
        env:
          E2E_TENANT_BASE_URL: ${{ secrets.E2E_TENANT_BASE_URL }}
          E2E_TENANT_A_EMAIL: ${{ secrets.E2E_TENANT_A_EMAIL }}
          E2E_TENANT_A_PASSWORD: ${{ secrets.E2E_TENANT_A_PASSWORD }}
          E2E_TENANT_A_PATIENT_ID: ${{ secrets.E2E_TENANT_A_PATIENT_ID }}
          E2E_TENANT_A_PATIENT_LABEL: ${{ secrets.E2E_TENANT_A_PATIENT_LABEL }}
          E2E_TENANT_B_EMAIL: ${{ secrets.E2E_TENANT_B_EMAIL }}
          E2E_TENANT_B_PASSWORD: ${{ secrets.E2E_TENANT_B_PASSWORD }}
          E2E_TENANT_B_PATIENT_ID: ${{ secrets.E2E_TENANT_B_PATIENT_ID }}
          E2E_TENANT_B_PATIENT_LABEL: ${{ secrets.E2E_TENANT_B_PATIENT_LABEL }}
        run: npm run test:e2e:tenant

  e2e-delegated-admin-permissions:
    if: github.ref == 'refs/heads/main' && secrets.E2E_TENANT_BASE_URL != '' && secrets.E2E_GLOBAL_ADMIN_EMAIL != '' && secrets.E2E_GLOBAL_ADMIN_PASSWORD != '' && secrets.E2E_TENANT_ADMIN_EMAIL != '' && secrets.E2E_TENANT_ADMIN_PASSWORD != '' && secrets.E2E_NON_ADMIN_EMAIL != '' && secrets.E2E_NON_ADMIN_PASSWORD != ''
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run delegated admin permission tests
        env:
          E2E_TENANT_BASE_URL: ${{ secrets.E2E_TENANT_BASE_URL }}
          E2E_GLOBAL_ADMIN_EMAIL: ${{ secrets.E2E_GLOBAL_ADMIN_EMAIL }}
          E2E_GLOBAL_ADMIN_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_PASSWORD }}
          E2E_TENANT_ADMIN_EMAIL: ${{ secrets.E2E_TENANT_ADMIN_EMAIL }}
          E2E_TENANT_ADMIN_PASSWORD: ${{ secrets.E2E_TENANT_ADMIN_PASSWORD }}
          E2E_NON_ADMIN_EMAIL: ${{ secrets.E2E_NON_ADMIN_EMAIL }}
          E2E_NON_ADMIN_PASSWORD: ${{ secrets.E2E_NON_ADMIN_PASSWORD }}
        run: npx playwright test tests/e2e/delegated-admin-permissions.spec.ts --config=playwright.tenant.config.ts

  e2e-specialization-permission-boundaries:
    if: github.ref == 'refs/heads/main' && secrets.E2E_TENANT_BASE_URL != '' && secrets.E2E_SPEC_TRAUMA_ALLOWED_EMAIL != '' && secrets.E2E_SPEC_TRAUMA_ALLOWED_PASSWORD != '' && secrets.E2E_SPEC_TRAUMA_BLOCKED_EMAIL != '' && secrets.E2E_SPEC_TRAUMA_BLOCKED_PASSWORD != '' && secrets.E2E_SPEC_TRAUMA_PATIENT_ID != '' && secrets.E2E_SPEC_TRAUMA_REPORT_ID != ''
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run specialization permission boundary tests
        env:
          E2E_TENANT_BASE_URL: ${{ secrets.E2E_TENANT_BASE_URL }}
          E2E_SPEC_TRAUMA_ALLOWED_EMAIL: ${{ secrets.E2E_SPEC_TRAUMA_ALLOWED_EMAIL }}
          E2E_SPEC_TRAUMA_ALLOWED_PASSWORD: ${{ secrets.E2E_SPEC_TRAUMA_ALLOWED_PASSWORD }}
          E2E_SPEC_TRAUMA_BLOCKED_EMAIL: ${{ secrets.E2E_SPEC_TRAUMA_BLOCKED_EMAIL }}
          E2E_SPEC_TRAUMA_BLOCKED_PASSWORD: ${{ secrets.E2E_SPEC_TRAUMA_BLOCKED_PASSWORD }}
          E2E_SPEC_TRAUMA_PATIENT_ID: ${{ secrets.E2E_SPEC_TRAUMA_PATIENT_ID }}
          E2E_SPEC_TRAUMA_REPORT_ID: ${{ secrets.E2E_SPEC_TRAUMA_REPORT_ID }}
        run: npx playwright test tests/e2e/specialization-permission-boundaries.spec.ts --config=playwright.tenant.config.ts
